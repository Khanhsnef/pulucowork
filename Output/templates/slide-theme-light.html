<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Theme: LIGHT — Slide Template</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<!--
  ╔══════════════════════════════════════════════════╗
  ║  SLIDE THEME: LIGHT                              ║
  ║  Nền: #F2F4F8 (xám nhạt, neutral)               ║
  ║  Vibe: consulting, printable, clean & airy       ║
  ║  Text: màu tối, white cards, subtle shadows      ║
  ╚══════════════════════════════════════════════════╝

  CÁCH DÙNG:
  Copy toàn bộ <style> block vào slide HTML của bạn.
  Xem preview bằng cách mở file này trong browser.
-->
<style>
/* ─── CORE PALETTE ─── */
:root {
  --bg-body:        #E8ECF2;
  --bg-slide:       #F2F4F8;
  --bg-grad-1:      rgba(255,127,50,.09);   /* orange glow */
  --bg-grad-2:      rgba(14,65,116,.07);    /* blue glow */
  --grid-line:      rgba(14,65,116,.05);
  --accent-orange:  #FF7F32;
  --accent-blue:    #0E4174;

  --card-bg:        #FFFFFF;
  --card-border:    #DDE3EC;
  --card-shadow:    0 1px 3px rgba(14,65,116,.06), 0 4px 16px rgba(14,65,116,.04);

  --text-primary:   #0A1828;
  --text-secondary: #5A6778;
  --text-muted:     #8A97A8;
  --text-faint:     #B0BACC;

  --sep:            #E8ECF2;
  --prog-track:     #EDF0F5;

  /* Hero card — stays dark for visual anchor */
  --hero-bg:        linear-gradient(145deg, #0E4174 0%, #0A2E5C 100%);
  --hero-shadow:    0 4px 24px rgba(14,65,116,.25);

  --surv-han-bg:    #FEF2F2;
  --surv-han-bdr:   #FECACA;
  --surv-sgn-bg:    #F0FDF4;
  --surv-sgn-bdr:   #BBF7D0;

  --svg-grid:       #E8ECF2;
  --svg-axis:       #A0AABB;
  --svg-xlabel:     #8A97A8;
  --svg-cost:       #B0BACC;
  --svg-stat-bdr:   #E8ECF2;

  --action-bdr:     #EDF0F5;
  --action-txt:     #4A5568;
  --action-strong:  #0A1828;

  --footer-name:    #0E4174;
  --footer-tag:     #A0AABB;
}

/* ─── BASE ─── */
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Lexend',sans-serif; background:var(--bg-body); display:flex; flex-direction:column; align-items:center; }

/* ─── SLIDE SHELL ─── */
.slide { width:1280px; height:720px; position:relative; overflow:hidden; flex-shrink:0; }

.slide-bg { position:absolute; inset:0; background:var(--bg-slide); }
.slide-bg::before {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse 55% 45% at 100% 100%, var(--bg-grad-1) 0%, transparent 55%),
    radial-gradient(ellipse 45% 55% at 0% 0%, var(--bg-grad-2) 0%, transparent 50%);
}
.grid-lines {
  position:absolute; inset:0; pointer-events:none;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size:64px 64px;
}
.accent-line { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#0E4174 0%,#FF7F32 50%,transparent 100%); }
.slide-content { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; padding:38px 56px 32px; }

/* ─── HEADER ─── */
.s-eyebrow { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.eyebrow-dot { width:7px; height:7px; background:#FF7F32; border-radius:50%; }
.eyebrow-text { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#FF7F32; }
.s-title { font-size:28px; font-weight:900; color:var(--text-primary); letter-spacing:-.8px; line-height:1.15; }
.s-subtitle { font-size:12.5px; color:var(--text-secondary); margin-top:3px; }
.s-slide-num { font-size:12px; font-weight:700; color:var(--text-faint); letter-spacing:1px; }
.s-slide-num span { color:#0E4174; }

/* ─── CARD ─── */
.card { background:var(--card-bg); border:1px solid var(--card-border); border-radius:20px; box-shadow:var(--card-shadow); }

/* ─── TYPOGRAPHY ─── */
.label-xs { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-muted); }
.num-hero  { font-size:62px; font-weight:900; letter-spacing:-3px; line-height:1; color:var(--text-primary); }
.num-lg    { font-size:40px; font-weight:900; letter-spacing:-1.5px; line-height:1; color:var(--text-primary); }
.num-md    { font-size:26px; font-weight:800; letter-spacing:-1px; line-height:1; color:var(--text-primary); }
.body-sm   { font-size:12px; color:var(--text-secondary); line-height:1.6; }
.sep       { height:1px; background:var(--sep); margin:12px 0; }
.prog-track { height:7px; background:var(--prog-track); border-radius:999px; overflow:hidden; margin:10px 0 4px; }
.prog-fill  { height:100%; border-radius:999px; }

/* ─── PILLS ─── */
.pill      { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:10.5px; font-weight:700; }
.pill-warn { background:#FEF2F2; color:#DC2626; border:1px solid #FECACA; }
.pill-ok   { background:#F0FDF4; color:#16A34A; border:1px solid #BBF7D0; }
.pill-info { background:#FFF7ED; color:#C2410C; border:1px solid #FED7AA; }
.pill-blue { background:#EFF6FF; color:#1D4ED8; border:1px solid #BFDBFE; }

/* ─── HERO (dark anchor card) ─── */
.s1-hero {
  background: var(--hero-bg);
  border:none; border-radius:20px;
  position:relative; overflow:hidden;
  box-shadow:var(--hero-shadow);
}
.s1-hero::after {
  content:''; position:absolute; bottom:-50px; right:-50px;
  width:180px; height:180px;
  background:radial-gradient(circle,rgba(255,127,50,.25) 0%,transparent 65%);
  pointer-events:none;
}

/* ─── SURVIVAL ─── */
.surv-block.han { background:var(--surv-han-bg); border:1.5px solid var(--surv-han-bdr); }
.surv-block.sgn { background:var(--surv-sgn-bg); border:1.5px solid var(--surv-sgn-bdr); }
.surv-pct { font-size:42px; font-weight:900; letter-spacing:-2px; line-height:1; }
.surv-block.han .surv-pct { color:#DC2626; }
.surv-block.sgn .surv-pct { color:#16A34A; }
.surv-row { display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-muted); }
.surv-row span { color:#1E293B; font-weight:600; }

/* ─── ACTIONS ─── */
.act-item { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid var(--action-bdr); }
.act-item:last-child { border-bottom:none; }
.act-num { width:19px; height:19px; background:#0E4174; color:#fff; border-radius:6px; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.act-txt { font-size:11px; color:var(--action-txt); line-height:1.55; }
.act-txt strong { color:var(--action-strong); font-weight:700; }

/* ─── FOOTER ─── */
.footer-logo { width:18px; height:18px; background:#FF7F32; border-radius:50%; }
.footer-name { font-size:10px; font-weight:800; color:var(--footer-name); letter-spacing:1.5px; }
.footer-tag  { font-size:10px; color:var(--footer-tag); letter-spacing:.8px; }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-bg"></div>
  <div class="grid-lines"></div>
  <div class="accent-line"></div>
  <div class="slide-content" style="justify-content:center;align-items:center;gap:16px">
    <div style="text-align:center">
      <div class="s-eyebrow" style="justify-content:center"><div class="eyebrow-dot"></div><span class="eyebrow-text">Theme Preview</span></div>
      <div class="s-title">LIGHT Theme</div>
      <div class="s-subtitle">Nền #F2F4F8 · Xám nhạt · White cards + shadow · Dark text · Printable</div>
    </div>
    <div style="display:flex;gap:16px;margin-top:8px">
      <div class="card" style="padding:20px 28px;min-width:200px;text-align:center">
        <div class="label-xs" style="margin-bottom:8px">Metric</div>
        <div class="num-lg">7,365</div>
        <div class="body-sm" style="margin-top:4px">Tài xế có baga</div>
        <div class="sep"></div>
        <div style="display:flex;gap:8px;justify-content:center">
          <span class="pill pill-ok">✓ SGN 49%</span>
          <span class="pill pill-warn">⚠ HAN 39%</span>
        </div>
      </div>
      <div class="card" style="padding:20px 28px;min-width:200px">
        <div class="label-xs" style="margin-bottom:8px">Survival Rate</div>
        <div style="display:flex;gap:12px">
          <div class="surv-block han" style="padding:12px;border-radius:12px;flex:1">
            <div style="font-size:10px;color:#DC2626;font-weight:700;letter-spacing:1px;text-transform:uppercase">HAN</div>
            <div class="surv-pct" style="font-size:32px">34%</div>
          </div>
          <div class="surv-block sgn" style="padding:12px;border-radius:12px;flex:1">
            <div style="font-size:10px;color:#16A34A;font-weight:700;letter-spacing:1px;text-transform:uppercase">SGN</div>
            <div class="surv-pct" style="font-size:32px">55%</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
